version: '3.8'

services:
  tee-server:
    build: .                                  # 使用当前目录的 Dockerfile 构建
    container_name: secure_nlp_tee            # 容器名称
    ports:
      - "50051:50051"                         # 宿主机端口:容器内端口
    environment:
      - TEE_MODE=docker                       # 当前为 Docker 模拟环境
    volumes:
      - ./certs:/app/certs:ro                 # 证书只读挂载（或 secrets/
    restart: unless-stopped